<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enerflo Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
/* ── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}

/* ── VARIABLES ─────────────────────────────────────── */
:root{
  --ef-orange:#FF6600;
  --ef-orange2:#FF8833;
  --ef-dark:#0B0B1A;
  --ef-panel:#121224;
  --ef-panel2:#1A1A30;
  --ef-border:#FF6600;
  --ef-dim:#252540;
  --neon-green:#00FF88;
  --neon-yellow:#FFD700;
  --neon-red:#FF4444;
  --text:#E8E8FF;
  --text-dim:#5050A0;
  --text-bright:#FFFFFF;
  --font-pixel:'Press Start 2P',monospace;
  --font-mono:'VT323',monospace;
}

/* ── BASE ──────────────────────────────────────────── */
html,body{height:100%;background:var(--ef-dark);color:var(--text);font-family:var(--font-mono);font-size:16px;line-height:1.5}

/* Scanline overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}

/* ── SCROLLBARS ────────────────────────────────────── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--ef-dark)}
::-webkit-scrollbar-thumb{background:var(--ef-orange)}

/* ── LAYOUT UTILS (flex/grid helpers) ─────────────── */
.flex{display:flex}.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}.justify-end{justify-content:flex-end}
.flex-col{flex-direction:column}.flex-1{flex:1 1 0%}.flex-shrink-0{flex-shrink:0}.flex-wrap{flex-wrap:wrap}
.min-w-0{min-width:0}.w-full{width:100%}.h-full{height:100%}
.grid{display:grid}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.grid-cols-1{grid-template-columns:repeat(1,1fr)}.grid-cols-2{grid-template-columns:repeat(2,1fr)}.grid-cols-3{grid-template-columns:repeat(3,1fr)}
.p-4{padding:16px}.p-6{padding:24px}.px-3{padding-left:12px;padding-right:12px}.px-4{padding-left:16px;padding-right:16px}
.px-6{padding-left:24px;padding-right:24px}.py-1{padding-top:4px;padding-bottom:4px}.py-2{padding-top:8px;padding-bottom:8px}
.py-3{padding-top:12px;padding-bottom:12px}.py-4{padding-top:16px;padding-bottom:16px}.py-8{padding-top:32px;padding-bottom:32px}
.py-10{padding-top:40px;padding-bottom:40px}.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mt-6{margin-top:24px}.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.mb-5{margin-bottom:20px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.ml-2{margin-left:8px}.mr-2{margin-right:8px}
.pr-4{padding-right:16px}.min-h-screen{min-height:100vh}.overflow-x-auto{overflow-x:auto}.overflow-auto{overflow:auto}
.text-center{text-align:center}.text-right{text-align:right}.text-left{text-align:left}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.relative{position:relative}.fixed{position:fixed}
.inset-0{inset:0}.z-30{z-index:30}.z-40{z-index:40}.z-50{z-index:50}.cursor-pointer{cursor:pointer}
.max-w-md{max-width:28rem}.max-w-lg{max-width:32rem}.max-w-2xl{max-width:42rem}.max-w-7xl{max-width:80rem}
.mx-auto{margin-left:auto;margin-right:auto}.inline-flex{display:inline-flex}
@media(min-width:640px){.sm\:flex-row{flex-direction:row}.sm\:items-center{align-items:center}.sm\:col-span-2{grid-column:span 2}.sm\:grid-cols-2{grid-template-columns:repeat(2,1fr)}.sm\:grid-cols-3{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.md\:px-8{padding-left:32px;padding-right:32px}.md\:w-56{width:224px}.md\:block{display:block}.md\:hidden{display:none}.md\:static{position:static}.md\:ml-0{margin-left:0}.md\:flex{display:flex}}
@media(min-width:1024px){.lg\:col-span-2{grid-column:span 2}.lg\:col-span-3{grid-column:span 3}.lg\:col-span-5{grid-column:span 5}.lg\:grid-cols-3{grid-template-columns:repeat(3,1fr)}.lg\:grid-cols-5{grid-template-columns:repeat(5,1fr)}}

/* ── ANIMATIONS ────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 6px var(--ef-orange)}50%{text-shadow:0 0 16px var(--ef-orange),0 0 28px var(--ef-orange)}}
@keyframes scanMove{from{background-position:0 0}to{background-position:0 100%}}
@keyframes pixelPulse{0%,100%{box-shadow:3px 3px 0 #CC4400}50%{box-shadow:5px 5px 0 #CC4400,0 0 12px rgba(255,102,0,.4)}}
.fade-in{animation:fadeIn .18s ease}
.blink{animation:blink .8s step-end infinite}
.glow{animation:glow 2.5s ease-in-out infinite}

/* ── PIXEL CARD ────────────────────────────────────── */
.pixel-card{
  background:var(--ef-panel);
  border:3px solid var(--ef-orange);
  box-shadow:4px 4px 0 rgba(255,102,0,.35);
  padding:20px;
  position:relative;
}
.pixel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--ef-orange),transparent 60%)}

/* ── BUTTONS ───────────────────────────────────────── */
.btn-pixel{
  font-family:var(--font-pixel);font-size:9px;letter-spacing:.05em;
  border:3px solid;cursor:pointer;text-transform:uppercase;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .05s,box-shadow .05s;user-select:none;
  line-height:1.4;
}
.btn-pixel:not(.btn-disabled):hover{transform:translate(-1px,-1px)}
.btn-pixel:not(.btn-disabled):active{transform:translate(1px,1px)}
.btn-pixel.btn-disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--ef-orange);color:#fff;border-color:#CC4400;box-shadow:3px 3px 0 #CC4400}
.btn-primary:hover{background:var(--ef-orange2);box-shadow:4px 4px 0 #CC4400}
.btn-primary:active{box-shadow:1px 1px 0 #CC4400}
.btn-secondary{background:var(--ef-panel2);color:var(--text);border-color:#303060;box-shadow:3px 3px 0 #0A0A18}
.btn-secondary:hover{border-color:var(--ef-orange)}
.btn-danger{background:#1A0000;color:var(--neon-red);border-color:#550000;box-shadow:3px 3px 0 #100000}
.btn-danger:hover{background:#280000}
.btn-success{background:#001A0D;color:var(--neon-green);border-color:#005533;box-shadow:3px 3px 0 #000F07}
.btn-ghost{background:transparent;color:var(--text-dim);border-color:var(--ef-dim);box-shadow:none}
.px-3{padding-left:12px;padding-right:12px}
.px-4{padding-left:16px;padding-right:16px}
.px-6{padding-left:24px;padding-right:24px}
.py-1{padding-top:4px;padding-bottom:4px}
.py-2{padding-top:8px;padding-bottom:8px}
.py-3{padding-top:12px;padding-bottom:12px}

/* ── BADGES ────────────────────────────────────────── */
.badge{font-family:var(--font-pixel);font-size:8px;padding:3px 7px;border:2px solid;
  display:inline-flex;align-items:center;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.badge-orange{background:rgba(255,102,0,.12);color:#FF9944;border-color:var(--ef-orange)}
.badge-green{background:rgba(0,255,136,.08);color:var(--neon-green);border-color:#00CC66}
.badge-red{background:rgba(255,68,68,.08);color:var(--neon-red);border-color:#CC2222}
.badge-gray{background:rgba(80,80,160,.1);color:#7070B0;border-color:#303080}
.badge-yellow{background:rgba(255,215,0,.08);color:var(--neon-yellow);border-color:#CCAA00}

/* ── INPUTS ────────────────────────────────────────── */
input,select,textarea{
  background:#07071A;color:var(--text);border:2px solid #252545;
  padding:8px 12px;width:100%;outline:none;
  font-family:var(--font-mono);font-size:18px;
  border-radius:0;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--ef-orange);
  box-shadow:0 0 0 1px var(--ef-orange),0 0 10px rgba(255,102,0,.25);
}
option{background:var(--ef-panel)}
input[type=date]{color-scheme:dark}

/* ── PIXEL LABEL ───────────────────────────────────── */
.pixel-label{font-family:var(--font-pixel);font-size:9px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.05em;display:block}

/* ── MODAL ─────────────────────────────────────────── */
.modal-overlay{background:rgba(0,0,12,.88)}
.modal-box{background:var(--ef-panel);border:3px solid var(--ef-orange);
  box-shadow:6px 6px 0 #CC4400,0 0 30px rgba(255,102,0,.2)}
.modal-header{border-bottom:2px solid var(--ef-orange)}
.modal-close{font-family:var(--font-pixel);font-size:10px;color:var(--text-dim);letter-spacing:.05em;
  padding:4px 8px}
.modal-close:hover{color:var(--neon-red)}
.pixel-heading{font-family:var(--font-pixel);font-size:11px;color:var(--ef-orange);letter-spacing:.05em}

/* ── DIVIDER ───────────────────────────────────────── */
.pixel-divider{border:none;border-top:2px solid var(--ef-dim)}

/* ── XP BAR ────────────────────────────────────────── */
.xp-bar-wrap{background:#07071A;border:2px solid var(--ef-dim);height:12px;position:relative;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--ef-orange),var(--neon-yellow));
  transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.xp-bar-fill::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.15) 0,rgba(255,255,255,.15) 3px,transparent 3px,transparent 6px)}

/* ── SIDEBAR ───────────────────────────────────────── */
.sidebar{
  width:56px;background:#07071A;border-right:3px solid var(--ef-orange);
  display:flex;flex-direction:column;position:fixed;height:100%;z-index:40;
  transition:width .2s;
}
@media(min-width:768px){.sidebar{position:static;width:220px}}
.sidebar-open{width:200px}
.sidebar-logo{
  padding:14px 12px;border-bottom:2px solid var(--ef-orange);
  display:flex;align-items:center;gap:10px;min-height:60px;
}
.sidebar-logo-icon{font-size:20px;flex-shrink:0}
.sidebar-logo-text{font-family:var(--font-pixel);font-size:9px;color:var(--ef-orange);
  display:none;white-space:nowrap;letter-spacing:.08em}
@media(min-width:768px){.sidebar-logo-text{display:block}}
.sidebar-mob-btn{color:var(--text-dim);font-size:18px;padding:4px}
.nav-item{
  font-family:var(--font-pixel);font-size:9px;letter-spacing:.04em;
  color:var(--text-dim);background:transparent;border:none;
  padding:10px 12px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  transition:color .1s,background .1s;
  white-space:nowrap;overflow:hidden;
}
.nav-item:hover{color:var(--ef-orange);background:rgba(255,102,0,.06)}
.nav-item-active{background:var(--ef-orange)!important;color:#fff!important;
  box-shadow:inset 2px 0 0 rgba(255,255,255,.2)}
.nav-icon{font-size:14px;flex-shrink:0}
.nav-text{display:none;overflow:hidden;text-overflow:ellipsis}
@media(min-width:768px){.nav-text{display:block}}
.sidebar-footer{padding:12px;border-top:2px solid var(--ef-orange)}
.sidebar-username{font-family:var(--font-pixel);font-size:8px;color:var(--text);
  display:none;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:768px){.sidebar-username{display:block}}
.logout-btn{font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);
  letter-spacing:.04em;text-transform:uppercase;padding:4px 0}
.logout-btn:hover{color:var(--neon-red)}
.main-content{margin-left:56px}
@media(min-width:768px){.main-content{margin-left:0}}

/* ── PAGE HEADER ───────────────────────────────────── */
.page-title{font-family:var(--font-pixel);font-size:16px;color:var(--ef-orange);
  letter-spacing:.06em;text-shadow:2px 2px 0 #CC4400;line-height:1.6}
.page-subtitle{font-family:var(--font-mono);font-size:16px;color:var(--text-dim)}
.section-title{font-family:var(--font-pixel);font-size:11px;color:var(--text);letter-spacing:.05em}

/* ── TABLE ─────────────────────────────────────────── */
table{border-collapse:collapse;width:100%}
.table-head th{font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.05em;padding-bottom:12px;border-bottom:2px solid var(--ef-orange)}
.table-row{border-bottom:2px solid var(--ef-dim)}
.table-row:hover{background:rgba(255,102,0,.04)}
.table-cell-name{font-family:var(--font-mono);font-size:18px;color:var(--text-bright);font-weight:600}
.table-cell-dim{font-family:var(--font-mono);font-size:16px;color:var(--text-dim)}
.table-cell-desc{font-family:var(--font-mono);font-size:14px;color:var(--text-dim);margin-top:2px}

/* ── LEADERBOARD ───────────────────────────────────── */
.lb-row{border-bottom:2px solid var(--ef-dim)}
.lb-row:last-child{border-bottom:none}
.lb-row-main:hover{background:rgba(255,102,0,.05)}
.lb-player-name{font-family:var(--font-mono);font-size:20px;color:var(--text-bright);font-weight:700}
.lb-player-team{font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);margin-top:2px}
.lb-score{font-family:var(--font-pixel);font-size:18px}
.lb-expand{background:#07071A;border:2px solid var(--ef-dim);padding:12px 16px;margin:0 0 8px 0}
.expand-row{border-bottom:1px solid var(--ef-dim)}
.expand-row:last-child{border-bottom:none}
.rank-badge{
  font-family:var(--font-pixel);font-size:8px;letter-spacing:.03em;
  width:44px;height:32px;display:flex;align-items:center;justify-content:center;
  border:2px solid;flex-shrink:0;
}
.rank-gold{background:linear-gradient(135deg,#3A2000,#8A5A00);color:var(--neon-yellow);border-color:var(--neon-yellow);
  text-shadow:0 0 8px var(--neon-yellow);box-shadow:0 0 12px rgba(255,215,0,.3)}
.rank-silver{background:linear-gradient(135deg,#1C1C28,#404060);color:#C0C0D8;border-color:#8080A0}
.rank-bronze{background:linear-gradient(135deg,#2A1400,#6B3800);color:#CD9060;border-color:#8B5A30}
.rank-other{background:var(--ef-panel2);color:var(--text-dim);border-color:var(--ef-dim)}

/* ── XP VALUES ─────────────────────────────────────── */
.xp-value{font-family:var(--font-pixel);font-size:14px;color:var(--neon-yellow)}
.xp-label{font-family:var(--font-pixel);font-size:9px;color:var(--text-dim)}

/* ── FILTER TOGGLES ────────────────────────────────── */
.toggle-group{display:inline-flex;border:2px solid var(--ef-orange);overflow:hidden}
.toggle-btn{font-family:var(--font-pixel);font-size:9px;padding:6px 12px;
  border:none;transition:background .1s,color .1s;letter-spacing:.04em}
.toggle-active{background:var(--ef-orange);color:#fff}
.toggle-inactive{background:var(--ef-panel2);color:var(--text-dim)}
.toggle-inactive:hover{color:var(--ef-orange)}

/* ── LOGIN ─────────────────────────────────────────── */
.login-screen{
  background:var(--ef-dark);
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(255,102,0,.12) 0%,transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(255,102,0,.04) 31px,rgba(255,102,0,.04) 32px),
    repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(255,102,0,.04) 31px,rgba(255,102,0,.04) 32px);
}
.login-logo-wrap{
  width:72px;height:72px;background:var(--ef-panel);border:3px solid var(--ef-orange);
  box-shadow:4px 4px 0 #CC4400,0 0 24px rgba(255,102,0,.4);
  animation:pixelPulse 2s ease-in-out infinite;
}
.login-logo-icon{font-size:32px}
.login-title{font-family:var(--font-pixel);font-size:22px;color:var(--ef-orange);
  text-shadow:3px 3px 0 #CC4400,0 0 20px rgba(255,102,0,.5);letter-spacing:.1em;
  animation:glow 3s ease-in-out infinite}
.login-subtitle{font-family:var(--font-pixel);font-size:14px;color:var(--text);
  letter-spacing:.15em;margin-top:6px}
.login-tagline{font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);letter-spacing:.08em}
.login-cursor{font-family:var(--font-pixel);font-size:16px;color:var(--ef-orange);height:24px}
.login-error{font-family:var(--font-pixel);font-size:9px;color:var(--neon-red);
  text-align:center;padding:8px;border:2px solid var(--neon-red);background:rgba(255,68,68,.08)}
.demo-btn{background:var(--ef-panel2);border:2px solid var(--ef-dim);padding:8px 12px;
  width:100%;cursor:pointer;transition:border-color .1s}
.demo-btn:hover{border-color:var(--ef-orange)}
.demo-role{font-family:var(--font-pixel);font-size:9px;color:var(--ef-orange)}
.demo-email{font-family:var(--font-mono);font-size:16px;color:var(--text-dim)}
.copyright{font-family:var(--font-pixel);font-size:7px;color:var(--ef-dim);letter-spacing:.06em}

/* ── GUILD CARDS ───────────────────────────────────── */
.guild-name{font-family:var(--font-pixel);font-size:12px;color:var(--ef-orange);letter-spacing:.05em}
.guild-members{font-family:var(--font-pixel);font-size:8px;color:var(--text-dim)}

/* ── XP ENTRY ──────────────────────────────────────── */
.xp-entry{background:var(--ef-panel2);border:2px solid var(--ef-dim);padding:10px 12px}
.xp-entry:hover{border-color:var(--ef-orange)}
.xp-entry-name{font-family:var(--font-mono);font-size:18px;color:var(--text-bright);font-weight:700}
.xp-entry-pts{font-family:var(--font-pixel);font-size:11px;color:var(--neon-yellow)}
.xp-entry-meta{font-family:var(--font-mono);font-size:14px;color:var(--text-dim)}

/* ── MY STATS ──────────────────────────────────────── */
.stat-num{font-family:var(--font-pixel);font-size:28px;line-height:1.4}
.history-row{border-bottom:2px solid var(--ef-dim)}
.history-row:last-child{border-bottom:none}
.history-dot{width:8px;height:8px;background:var(--ef-orange);flex-shrink:0;margin-top:6px}

/* ── AUDIT ─────────────────────────────────────────── */
.audit-row{border-bottom:2px solid var(--ef-dim)}
.audit-row:last-child{border-bottom:none}
.audit-row:hover{background:rgba(255,102,0,.03)}

/* ── MISC ──────────────────────────────────────────── */
.opacity-45{opacity:.45}
</style>
</head>
<body>
<div id="root"></div>
<script>
